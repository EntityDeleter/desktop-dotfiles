# groups: a dictionary of group settings
groups:
    "main":
        # persistent: prevents other groups from unloading the models in this group
        persistent: false

        # swap: controls the model swapping behaviour in within the group
        swap: true

        # exclusive: controls how the group affects other groups
        exclusive: false

        # members references the models defined above
        members:
            - "gpt-oss-20b-mxfp4"
            - "GLM-4.7-Flash-REAP-23B-A3B-UD-Q5_K_M"
            - "gemma-4-26B-A4B-it-UD-Q5_K_M"
            - "nvidia_Nemotron-Cascade-2-30B-A3B-Q5_K_M"
            - "Qwen3.6-35B-A3B-UD-Q5_K_M"
    "forever":
        # persistent: prevents other groups from unloading the models in this group
        persistent: true

        # swap: controls the model swapping behaviour in within the group
        swap: false

        # exclusive: controls how the group affects other groups
        exclusive: false

        # members references the models defined above
        members:
            - "Qwen3.5-0.8B-Q8_0"
